<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid / timeline motif -->
  <g opacity="0.22">
    <rect x="180" y="210" width="840" height="210" rx="24" fill="#020617" stroke="#1e293b" stroke-width="2"/>
    <g stroke="#1e293b" stroke-width="1">
      <line x1="220" y1="246" x2="980" y2="246"/>
      <line x1="220" y1="288" x2="980" y2="288"/>
      <line x1="220" y1="330" x2="980" y2="330"/>
      <line x1="220" y1="372" x2="980" y2="372"/>
    </g>
    <!-- Golden overlap band -->
    <rect x="380" y="222" width="280" height="186" rx="16" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.6"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(170 170)">
    <rect x="0" y="0" width="88" height="88" rx="24" fill="#020617" stroke="#22c55e" stroke-width="2"/>
    <circle cx="44" cy="44" r="26" fill="url(#accent)"/>
    <path d="M44 26v20l13 8" fill="none" stroke="#ecfdf5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="300" y="210" fill="#e5e7eb" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="60" font-weight="700">
    Time<tspan fill="#22c55e">Sync</tspan> by SyncZones
  </text>

  <text x="300" y="260" fill="#9ca3af" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30">
    Visualize timezone overlap for remote teams in seconds.
  </text>

  <text x="300" y="320" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">
    Add up to 5 timezones · Click any hour to copy meeting times · Share with a single link
  </text>

  <rect x="300" y="360" rx="999" ry="999" width="340" height="60" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.8"/>
  <text x="320" y="398" fill="#bbf7d0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">
    https://www.synczones.app
  </text>
</svg>

